databases:
  - name: voice-agent-db
    databaseName: voice_agent
    user: voice_agent

services:
  - type: web
    name: voice-agent-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: voice-agent-db
          property: connectionString
